<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resposta</title>
  <style>
    body {
      display: flex;
      justify-content: center;   /* centraliza horizontalmente */
      align-items: center;       /* centraliza verticalmente */
      flex-direction: column;
      height: 100vh;
      margin: 0;
      background-color: #e0ffe0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: url(download.jpg) center center no-repeat;
      background-size: cover;
    }

    h1 {
      color: #4CAF50;
      font-size: 32px;
      margin: 20px;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <h1>Assim que eu gosto!</h1>

  <!-- Música -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <audio id="musica" src="musica.mp3" loop autoplay></audio>


  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("play") === "true") {
        const musica = document.getElementById("musica");
        musica.play().catch(err => {
          console.log("Autoplay bloqueado, precisa de interação:", err);
        });
      }
    });

    <!-- Música -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>


  window.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("play") === "true") {
      const musica = document.getElementById("musica");
      musica.play().catch(() => {
        // Se o navegador bloquear autoplay, cria botão para liberar
        const btn = document.createElement("button");
        btn.textContent = "▶️ Tocar música";
        btn.style.padding = "10px 20px";
        btn.style.fontSize = "16px";
        btn.style.marginTop = "20px";
        btn.style.border = "none";
        btn.style.borderRadius = "5px";
        btn.style.backgroundColor = "#4CAF50";
        btn.style.color = "white";
        btn.style.cursor = "pointer";
        btn.onclick = () => musica.play();
        document.body.appendChild(btn);
      });
    }
  });

  </script>
</body>
</html>
